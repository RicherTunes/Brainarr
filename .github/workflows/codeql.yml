name: CodeQL

# Thin caller of Common's reusable CodeQL workflow (added in Common #538).
# Converges the per-plugin manual-build CodeQL analysis onto one shared source.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 3 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    uses: RicherTunes/Lidarr.Plugin.Common/.github/workflows/codeql-reusable.yml@533c14317131f4ec178f4c15a49ea6d9633ecd35 # main (aligned to ext-common-sha.txt)
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      solution: Brainarr.sln
      patch-taglib-nuget: true
    secrets:
      submodules-token: ${{ secrets.SUBMODULES_TOKEN }}
