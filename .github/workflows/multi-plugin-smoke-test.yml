name: 🔥 Multi-Plugin Smoke Test

on:
  push:
    branches: [ main ]
    paths:
      - 'Brainarr.Plugin/**'
      - '.github/workflows/multi-plugin-smoke-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Brainarr.Plugin/**'
      - '.github/workflows/multi-plugin-smoke-test.yml'
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

permissions:
  contents: read

jobs:
  smoke-test:
    name: 🔥 Plugin Co-existence
    uses: RicherTunes/Lidarr.Plugin.Common/.github/workflows/multi-plugin-smoke-test.yml@904d5ae60f3e259a2ef1e3c24e998998403597d9
    with:
      caller_plugin: brainarr
      test_plugins: 'brainarr,qobuzarr,tidalarr,applemusicarr'
      lidarr_tag: 'pr-plugins-3.1.2.4913'
    secrets: inherit
