name: 🚀 Automated Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-alpha.*'
      - 'v*.*.*-beta.*'
      - 'v*.*.*-rc.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.0 or v1.2.0-beta.1)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      draft:
        required: false
        type: boolean

env:
  DOTNET_VERSION: '6.0.x'
  # Align with CI default (see AGENTS.md CI Essentials)
  LIDARR_DOCKER_VERSION: 'pr-plugins-3.1.2.4913'

permissions:
  contents: write  # Required for creating releases
  id-token: write  # Required for keyless signing with Cosign

jobs:
  create-release:
    name: 🎁 Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: false
        token: ${{ github.token }}


    - name: Init Common submodule
      uses: ./.github/actions/init-common-submodule
      with:
        token: ${{ secrets.SUBMODULES_TOKEN }}


    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '6.0.x'

    - name: Patch submodule NuGet mapping (TagLibSharp-Lidarr)
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        DISPATCH_VERSION: ${{ github.event.inputs.version }}
      run: |
        set -euo pipefail
        CFG="ext/Lidarr.Plugin.Common/NuGet.config"
        if [ -f "$CFG" ]; then
          echo "Patching $CFG to include TagLibSharp-Lidarr mapping..."
          grep -q 'TagLibSharp-Lidarr' "$CFG" || \
            sed -i '/<packageSource key="lidarr-taglib">/a \\      <package pattern="TagLibSharp-Lidarr*" />' "$CFG"
          echo "Done."
        else
          echo "No submodule NuGet.config found at $CFG"
        fi

    - name: Read pinned plugins digest (if available)
      id: digest
      shell: bash
      run: |
        if [ -f .github/lidarr_digest.txt ]; then
          DIG=$(cat .github/lidarr_digest.txt | tr -d '\n')
          if [[ "$DIG" == sha256:* ]]; then
            echo "LIDARR_DOCKER_DIGEST=$DIG" >> "$GITHUB_ENV"
            echo "Using pinned digest: $DIG"
          fi
        fi

    - name: Extract Lidarr assemblies (plugins Docker)
      shell: bash
      run: |
        set -euo pipefail
        bash scripts/extract-lidarr-assemblies.sh --mode minimal --output-dir ext/Lidarr-docker/_output/net8.0

    - name: Verify assemblies and export LIDARR_PATH (allow tarball)
      shell: bash
      run: |
        set -euo pipefail
        bash scripts/ci/check-assemblies.sh ext/Lidarr-docker/_output/net8.0
        echo "LIDARR_PATH=${{ github.workspace }}/ext/Lidarr-docker/_output/net8.0" >> $GITHUB_ENV

    - name: 🏷️ Determine Version & Metadata
      id: version
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        DISPATCH_VERSION: ${{ github.event.inputs.version }}
      run: |
        if [ -n "$DISPATCH_VERSION" ]; then
          VERSION="$DISPATCH_VERSION"
        elif [ -n "$INPUT_VERSION" ]; then
          VERSION="$INPUT_VERSION"
        else
          VERSION="${GITHUB_REF#refs/tags/}"
        fi

        echo "version=$VERSION" >> $GITHUB_OUTPUT

        # Extract semantic version parts
        VERSION_NUM="${VERSION#v}"
        echo "version_num=$VERSION_NUM" >> $GITHUB_OUTPUT

        # Determine if prerelease
        if [[ "$VERSION" =~ -alpha|-beta|-rc ]]; then
          echo "prerelease=true" >> $GITHUB_OUTPUT
          echo "🧪 Detected prerelease version: $VERSION"
        else
          echo "prerelease=false" >> $GITHUB_OUTPUT
          echo "🎉 Detected stable release version: $VERSION"
        fi

        # Find previous tag for changelog generation
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
        echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
        echo "📋 Previous version: $PREVIOUS_TAG"

    - name: Check if Release exists
      id: check_release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        TAG="${{ steps.version.outputs.version }}"
        CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
        if [ "$CODE" = "200" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Release $TAG already exists; downstream steps will be skipped."
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi


    - name: 🔄 Update Version in Project Files
      if: steps.check_release.outputs.exists == 'false'
      shell: bash
      run: |
        VERSION_NUM="${{ steps.version.outputs.version_num }}"
        echo "📝 Updating version to $VERSION_NUM in project files..."

        # Update plugin.json
        sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION_NUM\"/" plugin.json
        echo "✅ Updated plugin.json"

        # Update .csproj files if they exist with version properties
        find . -name "*.csproj" -exec grep -l "AssemblyVersion\|FileVersion\|AssemblyInformationalVersion" {} \; | while read file; do
          sed -i "s/<AssemblyVersion>.*<\/AssemblyVersion>/<AssemblyVersion>$VERSION_NUM.0<\/AssemblyVersion>/" "$file"
          sed -i "s/<FileVersion>.*<\/FileVersion>/<FileVersion>$VERSION_NUM.0<\/FileVersion>/" "$file"
          sed -i "s/<AssemblyInformationalVersion>.*<\/AssemblyInformationalVersion>/<AssemblyInformationalVersion>$VERSION_NUM<\/AssemblyInformationalVersion>/" "$file"
          echo "✅ Updated $file"
        done

        echo "🎯 Version update completed"

    - name: 🔨 Build Plugin
      if: steps.check_release.outputs.exists == 'false'
      shell: bash
      run: |
        echo "🔧 Building Brainarr plugin..."

        echo "📋 Available Lidarr assemblies:"
        ls -la ext/Lidarr-docker/_output/net8.0/

        # Restore + build the plugin project only. The .sln also pulls in test projects
        # which (a) take longer and (b) have suppressed ILRepack — building only the
        # plugin csproj keeps RepackPlugin (from PluginPackaging.targets) intact so the
        # output at Brainarr.Plugin/bin/ is the merged DLL (Common + Abstractions
        # internalized).
        dotnet restore Brainarr.Plugin/Brainarr.Plugin.csproj
        dotnet build Brainarr.Plugin/Brainarr.Plugin.csproj \
          --configuration Release \
          --no-restore \
          -p:LidarrPath="${{ github.workspace }}/ext/Lidarr-docker/_output/net8.0" \
          -m:1

        echo "✅ Plugin build completed"

    - name: Package Plugin
      if: steps.check_release.outputs.exists == 'false'
      shell: bash
      run: |
        # Packaging policy (see ext/Lidarr.Plugin.Common/build/PluginPackaging.targets):
        #
        #   MUST SHIP:
        #     - Lidarr.Plugin.Brainarr.dll (merged: Common + Abstractions internalized via ILRepack)
        #     - plugin.json
        #     - manifest.json
        #     - .lidarr.plugin (Brainarr plugin marker)
        #
        #   MUST NOT SHIP (host-provided / cross-boundary type-identity):
        #     - FluentValidation.dll, NLog.dll, System.Text.Json.dll
        #     - Microsoft.Extensions.{DependencyInjection,Logging}.Abstractions.dll (DI/ILogger contracts)
        #     - Lidarr.*.dll, NzbDrone.*.dll (host assemblies)
        #
        #   MERGED/INTERNALIZED (do NOT ship as sidecars; merging happens in RepackPlugin):
        #     - Lidarr.Plugin.Common.dll, Lidarr.Plugin.Abstractions.dll
        #     - Polly*, TagLibSharp*, Microsoft.Extensions.{DI,Caching,Options,Primitives,Http}, CliWrap
        #
        # Lidarr's PluginService filters release assets by filename containing "net8.0.zip"
        # (case-insensitive). Without that substring the UI Install button spinner hangs forever.

        BUILD_DIR="Brainarr.Plugin/bin"
        DLL="$BUILD_DIR/Lidarr.Plugin.Brainarr.dll"

        if [ ! -f "$DLL" ]; then
          echo "❌ Merged plugin DLL not found at $DLL" >&2
          echo "RepackPlugin (from PluginPackaging.targets) should have produced it." >&2
          echo "Build output:" >&2
          find Brainarr.Plugin/bin -maxdepth 3 -type f 2>&1 | sed 's/^/  /' >&2
          exit 1
        fi

        DLL_SIZE=$(stat -c%s "$DLL")
        echo "🔍 Merged plugin DLL: $DLL ($DLL_SIZE bytes)"
        if [ "$DLL_SIZE" -lt 2000000 ]; then
          echo "⚠️  DLL is suspiciously small ($DLL_SIZE bytes) — ILRepack may not have merged Common + Abstractions." >&2
          echo "    Expected ~3+ MB for the merged assembly." >&2
          exit 1
        fi

        mkdir -p release
        cp "$DLL" release/
        cp plugin.json release/
        cp manifest.json release/
        if [ -f .lidarr.plugin ]; then cp .lidarr.plugin release/; fi

        echo "📦 Release package contents:"
        ls -la release/

        # Regression guard — fail loudly if any forbidden host DLL slipped in.
        for forbidden in \
          FluentValidation.dll NLog.dll System.Text.Json.dll Newtonsoft.Json.dll \
          Microsoft.Extensions.Logging.Abstractions.dll \
          Microsoft.Extensions.DependencyInjection.Abstractions.dll \
          Microsoft.Extensions.Caching.Abstractions.dll \
          Microsoft.Extensions.Caching.Memory.dll \
          Microsoft.Extensions.Options.dll Microsoft.Extensions.Primitives.dll \
          Lidarr.Plugin.Common.dll Lidarr.Plugin.Abstractions.dll \
          Lidarr.Core.dll Lidarr.Common.dll Lidarr.Http.dll Lidarr.Api.V1.dll; do
          if [ -f "release/$forbidden" ]; then
            echo "❌ FORBIDDEN host assembly in package: $forbidden" >&2
            echo "    These cause type-identity conflicts when the host loads the plugin." >&2
            exit 1
          fi
        done

        cd release
        zip -r ../Brainarr-${{ steps.version.outputs.version }}.net8.0.zip .
        cd ..

        sha256sum Brainarr-${{ steps.version.outputs.version }}.net8.0.zip > Brainarr-${{ steps.version.outputs.version }}.net8.0.zip.sha256

    - name: Generate SBOM (SPDX JSON)
      if: steps.check_release.outputs.exists == 'false'
      uses: anchore/sbom-action@v0
      with:
        path: .
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Install Cosign
      if: steps.check_release.outputs.exists == 'false'
      uses: sigstore/cosign-installer@v3

    - name: Sign ZIP with Cosign (keyless)
      if: steps.check_release.outputs.exists == 'false'
      env:
        COSIGN_EXPERIMENTAL: "true"
      run: |
        cosign version
        cosign sign-blob \
          --yes \
          --output-signature Brainarr-${{ steps.version.outputs.version }}.net8.0.zip.sig \
          Brainarr-${{ steps.version.outputs.version }}.net8.0.zip

    - name: 📝 Generate Release Notes
      if: steps.check_release.outputs.exists == 'false'
      id: release_notes
      run: |
        echo "📝 Generating comprehensive release notes..."

        # Make script executable and run it
        chmod +x .github/scripts/generate-release-notes.sh
        ./.github/scripts/generate-release-notes.sh "${{ steps.version.outputs.version }}" "${{ steps.version.outputs.previous_tag }}"

        echo "✅ Release notes generated"

        # Output first few lines for verification
        echo "📄 Release notes preview:"
        head -10 release_notes.md

    - name: Upload Build Artifacts
      if: steps.check_release.outputs.exists == 'false'
      uses: actions/upload-artifact@v7
      with:
        name: brainarr-plugin-${{ steps.version.outputs.version }}
        path: |
          Brainarr-${{ steps.version.outputs.version }}.net8.0.zip
          Brainarr-${{ steps.version.outputs.version }}.net8.0.zip.sha256
          release/
        retention-days: 90

    - name: 🎁 Create GitHub Release
      if: steps.check_release.outputs.exists == 'false'
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: "🧠 Brainarr ${{ steps.version.outputs.version }} - AI-Powered Music Discovery"
        body_path: release_notes.md
        draft: ${{ github.event.inputs.draft == 'true' }}
        prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
        files: |
          Brainarr-${{ steps.version.outputs.version }}.net8.0.zip
          Brainarr-${{ steps.version.outputs.version }}.net8.0.zip.sha256
          Brainarr-${{ steps.version.outputs.version }}.net8.0.zip.sig
          sbom.spdx.json
        generate_release_notes: false  # We're providing our own comprehensive notes

    - name: Move 'latest' tag to this release
      if: steps.check_release.outputs.exists == 'false' && github.ref_type == 'tag'
      shell: bash
      env:
        VERSION_TAG: ${{ steps.version.outputs.version }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        # Configure git to use GITHUB_TOKEN for authentication
        git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        git fetch --tags --force
        git tag -f latest "$VERSION_TAG"
        # Delete remote 'latest' if exists, then push the new one
        git push origin :refs/tags/latest || true
        git push origin latest

    - name: 📚 Update Wiki Documentation
      run: |
        echo "📚 Updating wiki documentation for release ${{ steps.version.outputs.version }}..."

        # Clone wiki repository
        git clone https://github.com/${{ github.repository }}.wiki.git wiki-repo || {
          echo "⚠️ Wiki repository doesn't exist yet - skipping wiki update"
          echo "💡 Wiki will be created when first page is added manually"
          exit 0
        }

        cd wiki-repo

        # Update version references in wiki content
        echo "🔄 Updating version references in wiki..."

        # Copy latest wiki content
        cp ../wiki-content/*.md . 2>/dev/null || echo "No wiki content to update"

        # Update version numbers in wiki pages
        sed -i "s/v1\.0\.3/${{ steps.version.outputs.version }}/g" *.md 2>/dev/null || true
        sed -i "s/Brainarr-v1\.0\.3/Brainarr-${{ steps.version.outputs.version }}/g" *.md 2>/dev/null || true

        # Update download URLs to latest
        sed -i "s|download/v1\.0\.3/|download/${{ steps.version.outputs.version }}/|g" *.md 2>/dev/null || true

        # Check for changes
        if git diff --quiet; then
          echo "ℹ️ No wiki updates needed"
        else
          echo "📝 Committing wiki updates..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "docs: update wiki for release ${{ steps.version.outputs.version }}

          • Updated version references throughout documentation
          • Updated download URLs to latest release
          • Synchronized with codebase changes

          Auto-updated by release automation."

          git push origin master 2>/dev/null || git push origin main 2>/dev/null
          echo "✅ Wiki updated successfully"
        fi

        cd ..
        rm -rf wiki-repo

    - name: 🎉 Release Summary
      run: |
        echo "🎉 Successfully created release!"
        echo "📦 Release: Brainarr ${{ steps.version.outputs.version }}"
        echo "🔗 URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}"
        echo "📋 Prerelease: ${{ steps.version.outputs.prerelease }}"
        echo "💾 Assets: Brainarr-${{ steps.version.outputs.version }}.net8.0.zip + SHA256"
        echo "📚 Wiki: Updated with latest version references"
        echo ""
        echo "📥 Installation command:"
        echo "GitHub URL: https://github.com/${{ github.repository }}"
