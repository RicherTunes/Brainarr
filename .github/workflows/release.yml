name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-alpha.*'
      - 'v*.*.*-beta.*'
      - 'v*.*.*-rc.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.0 or v1.2.0-beta.1)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false

jobs:
  release:
    uses: RicherTunes/Lidarr.Plugin.Common/.github/workflows/release-plugin.yml@79519ca5fe0e0813d0a31803bb2385bf0b19dfb9 # workflows/v1
    # TODO: replace @main with merge-commit SHA after PR #514 merges
    with:
      plugin_name: Brainarr
      plugin_dll: Lidarr.Plugin.Brainarr.dll
      main_csproj: Brainarr.Plugin/Brainarr.Plugin.csproj
      lidarr_path_msbuild_prop: LidarrPath
      dll_search_dirs: 'Brainarr.Plugin/bin'
      release_name_template: 'Brainarr {version} - AI-Powered Music Discovery'
      include_wiki_update: true
      version: ${{ inputs.version || '' }}
      draft: ${{ inputs.draft || false }}
    secrets:
      SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
