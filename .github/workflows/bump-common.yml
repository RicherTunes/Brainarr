name: Bump Common Submodule

on:
  workflow_dispatch: {}
  schedule:
    # Run daily at 2:15 AM UTC (after Common nightly at 5 AM, before our nightly at 6 AM)
    - cron: '15 2 * * *'

jobs:
  bump:
    uses: RicherTunes/Lidarr.Plugin.Common/.github/workflows/bump-common-plugin.yml@workflows/v1 # workflows/v1
    # TODO: replace @main with merge-commit SHA after PR #514 merges
    with:
      plugin_csproj: Brainarr.Plugin/Brainarr.Plugin.csproj
      solution_file: Brainarr.sln
      lidarr_path_msbuild_prop: LidarrPath
      include_build_verify: true
      extract_script_path: scripts/extract-lidarr-assemblies.sh
    secrets:
      SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
