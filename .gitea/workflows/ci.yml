name: CI
# Gitea-primary CI (GitHub Actions is out of credits). Two jobs:
#   * lint   -- shared Common plugin lint gates; pwsh-only.
#   * verify -- full build + ILRepack package + packaging-closure + deterministic tests via
#     scripts/verify-local.ps1. The act_runner mounts the Docker socket (so verify-local can extract
#     the Lidarr plugins-branch host assemblies); the node image lacks the docker CLI, so the job
#     installs pwsh / .NET / Docker CLI from self-contained downloads. Mirrors tidal/amazon/qobuz/apple.
# Actions ARE enabled on Gitea and this is the authoritative primary CI (lint + verify).
# .github/workflows/ci.yml is a guarded GitHub mirror; Gitea remains the authoritative
# merge gate and the mirror jobs are scoped to github.com.
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Gitleaks secret scan
        shell: bash
        run: |
          set -euo pipefail
          GITLEAKS_SHA256=ba6dbb656933921c775ee5a2d1c13a91046e7952e9d919f9bac4cec61d628e7d
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz -o /tmp/gitleaks.tgz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tgz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-banner --redact --exit-code 1

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # The bare runner image has no pwsh and the catthehacker container can't reach Gitea
      # for checkout on this host (the qobuz #12 blocker). Fetch the self-contained release
      # tarball instead - mechanism proven green on Common's lint job.
      - name: Install PowerShell
        shell: bash
        run: |
          set -e
          curl -sSL https://github.com/PowerShell/PowerShell/releases/download/v7.4.6/powershell-7.4.6-linux-x64.tar.gz -o /tmp/pwsh.tgz
          mkdir -p /opt/pwsh
          tar -xzf /tmp/pwsh.tgz -C /opt/pwsh
          chmod +x /opt/pwsh/pwsh
          echo "/opt/pwsh" >> "$GITHUB_PATH"
      # The plugin contract tests (scripts/tests/*.ps1) are Pester-based; Pester is not
      # bundled with the self-contained PowerShell tarball, so install it from PSGallery.
      # Pinned to a known-good 5.x release to avoid accidental major-version drift.
      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -RequiredVersion 5.6.1 -Force -SkipPublisherCheck
      - name: Shared plugin lint gates
        shell: pwsh
        run: ./ext/Lidarr.Plugin.Common/scripts/ci/run-plugin-lint-gates.ps1 -RepoPath . -CommonRoot ext/Lidarr.Plugin.Common -Mode ci

  # Full build + ILRepack package + packaging-closure + deterministic tests via verify-local.
  # verify-local extracts the Lidarr host assemblies from Docker; the act_runner mounts the Docker
  # socket but the node image lacks the docker CLI, so install it. Mirrors tidal/amazon/qobuz/apple.
  verify:
    needs: [lint, secret-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DOTNET_VERSION: 8.0.x
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      # Init ONLY the public Common submodule (ext/Lidarr source is unneeded — verify-local extracts
      # the host assemblies via Docker).
      - name: Init Common submodule
        shell: bash
        run: |
          set -e
          AUTH_HEADER="$(printf 'x-access-token:%s' '${{ secrets.GITHUB_TOKEN }}' | base64 | tr -d '\n')"
          git -c "http.http://192.168.2.59:3001/.extraheader=AUTHORIZATION: basic $AUTH_HEADER" \
            submodule update --init ext/Lidarr.Plugin.Common
      - name: Common submodule pin guard
        shell: bash
        run: bash ext/Lidarr.Plugin.Common/scripts/repin-common-submodule.sh --verify-only --path ext/Lidarr.Plugin.Common
      - name: Install PowerShell
        shell: bash
        run: |
          set -e
          curl -sSL https://github.com/PowerShell/PowerShell/releases/download/v7.4.6/powershell-7.4.6-linux-x64.tar.gz -o /tmp/pwsh.tgz
          mkdir -p /opt/pwsh
          tar -xzf /tmp/pwsh.tgz -C /opt/pwsh
          chmod +x /opt/pwsh/pwsh
          echo "/opt/pwsh" >> "$GITHUB_PATH"
      - name: Install .NET SDK
        shell: bash
        run: |
          set -e
          curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
          bash /tmp/dotnet-install.sh --channel 8.0 --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          echo "DOTNET_ROOT=$HOME/.dotnet" >> "$GITHUB_ENV"
          "$HOME/.dotnet/dotnet" --version
      # act_runner runs ubuntu-latest inside a container; the Docker socket is mounted but the node
      # image ships no docker CLI, which verify-local.ps1 invokes for host-assembly extraction.
      - name: Install Docker CLI
        shell: bash
        run: |
          set -e
          if ! command -v docker >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends docker.io
            rm -rf /var/lib/apt/lists/*
          fi
          docker --version
          docker ps >/dev/null
      - name: Full local-ci verification
        shell: bash
        run: pwsh ./scripts/verify-local.ps1
